<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 命题系统 - 登录</title>
    <link rel="stylesheet" href="/static/vendor/element-plus.css">
    <script src="/static/vendor/vue.global.prod.js"></script>
    <script src="/static/vendor/element-plus.js"></script>
    <script src="/static/vendor/element-plus-icons.js"></script>
    <script src="/static/vendor/axios.min.js"></script>
    <script src="/static/js/shared.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            padding: 48px 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,.15);
        }
        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #303133;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-desc {
            font-size: 14px;
            color: #909399;
            text-align: center;
            margin-bottom: 32px;
        }
        .login-form .el-form-item__label {
            font-size: 15px;
            font-weight: 500;
        }
        .login-btn {
            width: 100%;
            height: 44px;
            font-size: 16px;
            margin-top: 8px;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #c0c4cc;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="login-card">
        <div class="login-title">AI 命题系统</div>
        <div class="login-desc">选择科目，进入题库管理</div>

        <el-form class="login-form" label-position="top">
            <el-form-item label="选择科目">
                <el-select v-model="selectedSubject" style="width: 100%;" placeholder="请选择您负责的科目" size="large" @change="onSubjectChange">
                    <el-option v-for="sub in subjectList" :key="sub.value" :label="sub.label" :value="sub.value"></el-option>
                </el-select>
            </el-form-item>

            <el-form-item label="科目老师姓名" v-if="selectedSubject">
                <el-input v-model="teacherName" placeholder="请输入您的真实姓名" size="large" clearable />
            </el-form-item>

            <el-button type="primary" class="login-btn" @click="enterSystem"
                :disabled="!selectedSubject || !teacherName.trim()">
                进入系统
            </el-button>
        </el-form>
        <div class="login-footer">湖南省中职普测考试 · AI 智能评分</div>
        <div style="text-align: center; margin-top: 12px;">
            <a href="javascript:void(0)" @click="goAdmin" style="font-size: 12px; color: #909399; text-decoration: none;">管理员入口</a>
        </div>
    </div>
</div>

<script>
const { createApp, ref, onMounted } = Vue;
const { DEFAULT_SUBJECTS, SUBJECT_STORAGE_KEY, CURRENT_SUBJECT_KEY, ROLE_KEY, TEACHER_NAME_KEY } = window.SharedApp;

createApp({
    setup() {
        const selectedSubject = ref('');
        const subjectList = ref([]);
        const teacherName = ref('');
        const userMap = ref({}); // subject -> user record

        onMounted(async () => {
            // 加载科目列表
            const saved = localStorage.getItem(SUBJECT_STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                const defaultValues = DEFAULT_SUBJECTS.map(s => s.value);
                subjectList.value = parsed.filter(s => defaultValues.includes(s.value));
                if (subjectList.value.length === 0) subjectList.value = [...DEFAULT_SUBJECTS];
            } else {
                subjectList.value = [...DEFAULT_SUBJECTS];
            }

            // 加载用户列表，建立 subject -> user 映射
            try {
                const { data } = await axios.get('/api/users');
                if (data.success) {
                    for (const u of data.data) {
                        if (u.role === 'teacher' && u.subject) {
                            userMap.value[u.subject] = u;
                        }
                    }
                }
            } catch (e) {
                ElMessage.error('加载用户列表失败，请检查网络连接');
            }

            // 恢复上次选择的科目
            const lastSubject = localStorage.getItem(CURRENT_SUBJECT_KEY);
            if (lastSubject && subjectList.value.find(s => s.value === lastSubject)) {
                selectedSubject.value = lastSubject;
                onSubjectChange(lastSubject);
            }
        });

        const onSubjectChange = (subject) => {
            const user = userMap.value[subject];
            const saved = user?.teacher_name || user?.display_name || '';
            if (saved) {
                teacherName.value = saved;
            } else {
                const lastSubject = localStorage.getItem(CURRENT_SUBJECT_KEY);
                if (lastSubject === subject) {
                    teacherName.value = localStorage.getItem(TEACHER_NAME_KEY) || '';
                } else {
                    teacherName.value = '';
                }
            }
        };

        const enterSystem = async () => {
            if (!selectedSubject.value) {
                ElMessage.warning('请选择科目');
                return;
            }
            if (!teacherName.value.trim()) {
                ElMessage.warning('请输入您的姓名');
                return;
            }

            const name = teacherName.value.trim();
            const user = userMap.value[selectedSubject.value];

            // 保存姓名到数据库
            if (user && name !== (user.teacher_name || '')) {
                try {
                    await axios.put(`/api/users/${user.id}`, { teacher_name: name });
                    user.teacher_name = name;
                } catch (e) {
                    console.error('保存科目老师姓名失败', e);
                }
            }

            localStorage.setItem(ROLE_KEY, 'teacher');
            localStorage.setItem(CURRENT_SUBJECT_KEY, selectedSubject.value);
            localStorage.setItem(TEACHER_NAME_KEY, name);
            window.location.href = '/management?t=' + Date.now();
        };

        const goAdmin = () => {
            localStorage.setItem(ROLE_KEY, 'admin');
            localStorage.removeItem(CURRENT_SUBJECT_KEY);
            localStorage.removeItem(TEACHER_NAME_KEY);
            window.location.href = '/admin';
        };

        return { selectedSubject, subjectList, teacherName, onSubjectChange, enterSystem, goAdmin };
    }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
