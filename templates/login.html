<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 评分系统 - 登录</title>
    <link rel="stylesheet" href="/static/vendor/element-plus.css">
    <script src="/static/vendor/vue.global.prod.js"></script>
    <script src="/static/vendor/element-plus.js"></script>
    <script src="/static/vendor/element-plus-icons.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            padding: 48px 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,.15);
        }
        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #303133;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-desc {
            font-size: 14px;
            color: #909399;
            text-align: center;
            margin-bottom: 32px;
        }
        .role-cards {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }
        .role-card {
            flex: 1;
            padding: 20px 16px;
            border: 2px solid #e4e7ed;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-card:hover {
            border-color: #667eea;
            background: #f5f3ff;
        }
        .role-card.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
        }
        .role-card .role-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .role-card .role-label {
            font-size: 15px;
            font-weight: 600;
            color: #303133;
        }
        .role-card .role-desc {
            font-size: 12px;
            color: #909399;
            margin-top: 4px;
        }
        .login-form .el-form-item__label {
            font-size: 15px;
            font-weight: 500;
        }
        .login-btn {
            width: 100%;
            height: 44px;
            font-size: 16px;
            margin-top: 8px;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #c0c4cc;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="login-card">
        <div class="login-title">AI 评分系统</div>
        <div class="login-desc">{{ role === 'admin' ? '管理员模式' : '选择您的科目，进入题库管理' }}</div>

        <div class="role-cards">
            <div class="role-card" :class="{ active: role === 'teacher' }" @click="role = 'teacher'">
                <div class="role-icon">&#128218;</div>
                <div class="role-label">科目老师</div>
                <div class="role-desc">题库管理 · 评分</div>
            </div>
            <div class="role-card" :class="{ active: role === 'admin' }" @click="role = 'admin'">
                <div class="role-icon">&#9881;</div>
                <div class="role-label">管理员</div>
                <div class="role-desc">科目 · 模型配置</div>
            </div>
        </div>

        <el-form class="login-form" label-position="top">
            <el-form-item label="选择科目" v-if="role === 'teacher'">
                <el-select v-model="selectedSubject" style="width: 100%;" placeholder="请选择您负责的科目" size="large">
                    <el-option v-for="sub in subjectList" :key="sub.value" :label="sub.label" :value="sub.value"></el-option>
                </el-select>
            </el-form-item>

            <el-button type="primary" class="login-btn" @click="enterSystem"
                :disabled="role === 'teacher' && !selectedSubject">
                {{ role === 'admin' ? '进入管理后台' : '进入系统' }}
            </el-button>
        </el-form>
        <div class="login-footer">湖南省中职普测考试 · AI 智能评分</div>
    </div>
</div>

<script>
const { createApp, ref, onMounted } = Vue;

const DEFAULT_SUBJECTS = [
    { label: '思想政治', value: 'politics' },
    { label: '语文', value: 'chinese' },
    { label: '英语', value: 'english' },
    { label: '数学', value: 'math' },
    { label: '历史', value: 'history' },
    { label: '地理', value: 'geography' },
    { label: '物理', value: 'physics' },
    { label: '化学', value: 'chemistry' },
    { label: '生物', value: 'biology' }
];

const SUBJECT_STORAGE_KEY = 'ai_grading_subjects';
const CURRENT_SUBJECT_KEY = 'ai_grading_current_subject';
const ROLE_KEY = 'ai_grading_role';

createApp({
    setup() {
        const role = ref('teacher');
        const selectedSubject = ref('');
        const subjectList = ref([]);

        onMounted(() => {
            // 加载科目列表
            const saved = localStorage.getItem(SUBJECT_STORAGE_KEY);
            subjectList.value = saved ? JSON.parse(saved) : [...DEFAULT_SUBJECTS];

            // 恢复上次的角色
            const lastRole = localStorage.getItem(ROLE_KEY);
            if (lastRole === 'admin' || lastRole === 'teacher') {
                role.value = lastRole;
            }

            // 如果已有上次选择的科目，预选
            const last = localStorage.getItem(CURRENT_SUBJECT_KEY);
            if (last && subjectList.value.find(s => s.value === last)) {
                selectedSubject.value = last;
            }
        });

        const enterSystem = () => {
            localStorage.setItem(ROLE_KEY, role.value);
            if (role.value === 'admin') {
                localStorage.removeItem(CURRENT_SUBJECT_KEY);
            } else {
                if (!selectedSubject.value) return;
                localStorage.setItem(CURRENT_SUBJECT_KEY, selectedSubject.value);
            }
            window.location.href = '/management';
        };

        return { role, selectedSubject, subjectList, enterSystem };
    }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
