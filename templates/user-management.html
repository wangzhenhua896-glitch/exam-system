<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 命题系统 - 用户管理</title>
    <link rel="stylesheet" href="/static/vendor/element-plus.css">
    <link rel="stylesheet" href="/static/css/shared.css">
    <script src="/static/vendor/vue.global.prod.js"></script>
    <script src="/static/vendor/element-plus.js"></script>
    <script src="/static/vendor/element-plus-icons.js"></script>
    <script src="/static/vendor/axios.min.js"></script>
    <script src="/static/js/shared.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", PingFang SC, "Microsoft YaHei", sans-serif; background: #f5f7fa; }
        .content { flex: 1; padding: 20px; overflow-y: auto; background: #f5f7fa; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .toolbar-right { display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <div class="layout">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <span class="logo">AI 命题系统</span>
                    <span class="subtitle">用户管理</span>
                </div>
                <div class="header-right">
                    <div class="status-badge">
                        <span style="width:6px;height:6px;border-radius:50%;background:#67c23a;"></span>
                        管理员
                    </div>
                    <el-button text type="primary" @click="window.location.href='/login'">切换角色</el-button>
                </div>
            </div>

            <!-- Content -->
            <div class="content">
                <div class="page-card">
                    <!-- 工具栏 -->
                    <div class="toolbar">
                        <div style="font-size: 14px; color: #606266;">共 {{ users.length }} 个用户</div>
                        <div class="toolbar-right">
                            <el-input v-model="searchKeyword" placeholder="搜索用户名" clearable style="width: 200px;" :prefix-icon="Search" />
                            <el-button type="primary" @click="showAddDialog">添加用户</el-button>
                        </div>
                    </div>

                    <!-- 表格 -->
                    <el-table :data="filteredUsers" stripe style="width: 100%;" v-loading="loading">
                        <el-table-column prop="username" label="用户名" min-width="120" />
                        <el-table-column prop="display_name" label="显示名" min-width="120" />
                        <el-table-column prop="role" label="角色" width="100">
                            <template #default="{ row }">
                                <el-tag :type="row.role === 'admin' ? 'danger' : 'primary'" size="small">
                                    {{ row.role === 'admin' ? '管理员' : '科目老师' }}
                                </el-tag>
                            </template>
                        </el-table-column>
                        <el-table-column prop="subject" label="科目" width="100">
                            <template #default="{ row }">
                                {{ subjectLabels[row.subject] || row.subject || '-' }}
                            </template>
                        </el-table-column>
                        <el-table-column prop="created_at" label="创建时间" width="180" />
                        <el-table-column label="操作" width="150" fixed="right">
                            <template #default="{ row }">
                                <el-button size="small" text type="primary" @click="editUser(row)">编辑</el-button>
                                <el-popconfirm title="确定删除此用户？" @confirm="deleteUser(row.id)">
                                    <template #reference>
                                        <el-button size="small" text type="danger">删除</el-button>
                                    </template>
                                </el-popconfirm>
                            </template>
                        </el-table-column>
                    </el-table>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <a href="/grading">单题评分</a> | <a href="/management">题库管理</a> | <a href="/test-cases">测试集管理</a> | <a href="/sensitive-words">敏感词管理</a> | <a href="/user-management" style="font-weight:bold;">用户管理</a>
            </div>
        </div>

        <!-- 添加/编辑弹窗 -->
        <el-dialog v-model="dialogVisible" :title="editingId ? '编辑用户' : '添加用户'" width="480px" :close-on-click-modal="false">
            <el-form :model="form" label-width="80px">
                <el-form-item label="用户名" required>
                    <el-input v-model="form.username" placeholder="输入用户名（英文）" :disabled="!!editingId" />
                </el-form-item>
                <el-form-item label="显示名">
                    <el-input v-model="form.display_name" placeholder="输入显示名称" />
                </el-form-item>
                <el-form-item label="角色">
                    <el-select v-model="form.role" style="width: 100%;" @change="onRoleChange">
                        <el-option label="管理员" value="admin" />
                        <el-option label="科目老师" value="teacher" />
                    </el-select>
                </el-form-item>
                <el-form-item label="科目" v-if="form.role === 'teacher'">
                    <el-select v-model="form.subject" style="width: 100%;" placeholder="选择科目">
                        <el-option v-for="sub in subjectOptions" :key="sub.value" :label="sub.label" :value="sub.value" />
                    </el-select>
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="dialogVisible = false">取消</el-button>
                <el-button type="primary" @click="saveUser">保存</el-button>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const { Search } = ElementPlusIconsVue;

        const API_BASE = '';

        createApp({
            setup() {
                const users = ref([]);
                const loading = ref(false);
                const searchKeyword = ref('');
                const dialogVisible = ref(false);
                const editingId = ref(null);
                const form = ref({ username: '', display_name: '', role: 'teacher', subject: '' });

                const subjectLabels = window.SharedApp.SUBJECT_LABELS;
                const subjectOptions = window.SharedApp.DEFAULT_SUBJECTS;

                const filteredUsers = computed(() => {
                    if (!searchKeyword.value) return users.value;
                    const kw = searchKeyword.value.toLowerCase();
                    return users.value.filter(u =>
                        u.username.toLowerCase().includes(kw) ||
                        (u.display_name && u.display_name.toLowerCase().includes(kw))
                    );
                });

                async function loadUsers() {
                    loading.value = true;
                    try {
                        const { data } = await axios.get(API_BASE + '/api/users');
                        if (data.success) users.value = data.data;
                    } catch (e) {
                        ElMessage.error('加载用户列表失败');
                    }
                    loading.value = false;
                }

                function showAddDialog() {
                    editingId.value = null;
                    form.value = { username: '', display_name: '', role: 'teacher', subject: '' };
                    dialogVisible.value = true;
                }

                function editUser(row) {
                    editingId.value = row.id;
                    form.value = { username: row.username, display_name: row.display_name || '', role: row.role, subject: row.subject || '' };
                    dialogVisible.value = true;
                }

                function onRoleChange(role) {
                    if (role === 'admin') {
                        form.value.subject = '';
                    }
                }

                async function saveUser() {
                    if (!form.value.username.trim()) {
                        ElMessage.warning('请输入用户名');
                        return;
                    }
                    try {
                        if (editingId.value) {
                            await axios.put(API_BASE + '/api/users/' + editingId.value, form.value);
                        } else {
                            await axios.post(API_BASE + '/api/users', form.value);
                        }
                        ElMessage.success(editingId.value ? '更新成功' : '添加成功');
                        dialogVisible.value = false;
                        loadUsers();
                    } catch (e) {
                        ElMessage.error(e.response?.data?.message || '操作失败');
                    }
                }

                async function deleteUser(id) {
                    try {
                        await axios.delete(API_BASE + '/api/users/' + id);
                        ElMessage.success('删除成功');
                        loadUsers();
                    } catch (e) {
                        ElMessage.error('删除失败');
                    }
                }

                onMounted(() => {
                    const role = localStorage.getItem(window.SharedApp.ROLE_KEY);
                    if (role !== 'admin') {
                        window.location.href = '/login';
                        return;
                    }
                    loadUsers();
                });

                return {
                    users, loading, searchKeyword, dialogVisible, editingId,
                    form, subjectLabels, subjectOptions, filteredUsers,
                    loadUsers, showAddDialog, editUser, onRoleChange,
                    saveUser, deleteUser, Search,
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
