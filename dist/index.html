<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能评分系统 - 单题评分</title>
    <link rel="stylesheet" href="/static/vendor/element-plus.css">
    <script src="/static/vendor/vue.global.prod.js"></script>
    <script src="/static/vendor/element-plus.js"></script>
    <script src="/static/vendor/element-plus-icons.js"></script>
    <script src="/static/vendor/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", PingFang SC, "Microsoft YaHei", sans-serif; background: #f5f7fa; }
        .layout { height: 100vh; display: flex; flex-direction: column; }
        .header { background: #fff; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,21,41,.08); height: 60px; z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo { font-size: 20px; font-weight: bold; color: #409EFF; }
        .subtitle { font-size: 12px; color: #909399; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .status-badge { display: flex; align-items: center; gap: 5px; padding: 4px 12px; background: #f0f9eb; border-radius: 12px; font-size: 12px; color: #67c23a; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #67c23a; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #e4e7ed; overflow-y: auto; display: flex; flex-direction: column; transition: width 0.25s ease, opacity 0.25s ease; }
        .sidebar.collapsed { width: 0; overflow: hidden; opacity: 0; }
        .sidebar-nav { flex: 1; }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid #e4e7ed; }
        .content { flex: 1; padding: 20px; overflow-y: auto; background: #f5f7fa; }
        .page-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px 0 rgba(0,0,0,.05); }
        .result-score { font-size: 56px; font-weight: 700; color: #409EFF; text-align: center; }
        .result-score .unit { font-size: 20px; color: #909399; font-weight: 400; }
        .score-bar-wrap { margin: 16px auto 0; max-width: 400px; }
        .answer-count { font-size: 12px; color: #909399; text-align: right; margin-top: 4px; }
    </style>
</head>
<body>
<div id="app">
    <div class="layout">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="header-left">
                <el-button text @click="sidebarCollapsed = !sidebarCollapsed" style="font-size: 18px; padding: 4px 8px;">
                    <el-icon><Fold /></el-icon>
                </el-button>
                <div class="logo">📝 AI 评分系统</div>
                <div class="subtitle">国产大模型 · 高精度评分</div>
            </div>
            <div class="header-right">
                <el-tag size="small" type="info">{{ currentModelLabel || '未选择模型' }}</el-tag>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span>系统就绪</span>
                </div>
                <el-tag size="small" type="primary">单题评分</el-tag>
            </div>
        </div>

        <div class="main-container">
            <!-- 左侧导航 -->
            <div class="sidebar" :class="{ collapsed: sidebarCollapsed }">
                <div class="sidebar-nav">
                    <el-menu :default-active="currentPage" @select="handleMenuSelect">
                        <el-menu-item index="single"><el-icon><EditPen /></el-icon><span>单题评分</span></el-menu-item>
                        <el-menu-item index="testset"><el-icon><List /></el-icon><span>测试集</span></el-menu-item>
                        <el-menu-item index="history"><el-icon><Clock /></el-icon><span>历史记录</span></el-menu-item>
                    </el-menu>
                </div>
                <div class="sidebar-footer">
                    <div style="margin-bottom: 8px;">
                        <div style="font-size: 12px; color: #909399; margin-bottom: 6px;">当前模型</div>
                        <el-select v-model="currentProvider" size="small" style="width: 100%;" @change="onProviderChange">
                            <el-option v-for="p in providers" :key="p.id" :label="p.name + ' · ' + p.model" :value="p.id"></el-option>
                        </el-select>
                    </div>
                    <a href="/management" style="text-decoration: none;">
                        <el-button size="small" plain style="width: 100%;"><el-icon><Back /></el-icon> 返回题库管理</el-button>
                    </a>
                </div>
            </div>

            <!-- 右侧内容区 -->
            <div class="content">
                <!-- ========== 单题评分 ========== -->
                <template v-if="currentPage === 'single'">
                    <div style="display: flex; gap: 20px; align-items: flex-start;">
                        <!-- 左侧输入区 -->
                        <div :style="{ width: inputCollapsed ? '0' : '400px', overflow: 'hidden', transition: 'width 0.25s', flexShrink: 0 }">
                            <div class="page-card" style="margin-bottom: 0;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                                    <span style="font-size: 16px; font-weight: 600; color: #303133;">题目与答案</span>
                                    <el-button size="small" text @click="inputCollapsed = true">
                                        <el-icon><DArrowLeft /></el-icon> 折叠
                                    </el-button>
                                </div>

                                <!-- 题库选择 -->
                                <div style="margin-bottom: 16px;">
                                    <div style="font-size: 13px; color: #606266; margin-bottom: 6px;">从题库选择题目</div>
                                    <div style="display: flex; gap: 8px;">
                                        <el-select v-model="selectedQuestionId" filterable clearable placeholder="-- 手动输入 --" style="flex: 1;" @change="onQuestionSelect">
                                            <el-option v-for="q in questionList" :key="q.id" :label="'#' + q.id + ' ' + (q.title || (q.content || '').substring(0, 30))" :value="q.id"></el-option>
                                        </el-select>
                                        <el-button size="default" @click="loadQuestionList" :loading="loadingQuestions">
                                            <el-icon><Refresh /></el-icon>
                                        </el-button>
                                    </div>
                                    <div style="font-size: 12px; color: #909399; margin-top: 4px;">选择题目后自动加载题目信息，仅需输入学生答案</div>
                                </div>

                                <!-- 题目信息卡片（选题后显示） -->
                                <template v-if="selectedQuestion">
                                    <div style="background: #f5f7fa; border-radius: 8px; padding: 12px; margin-bottom: 16px;">
                                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                                            <span style="flex: 1; font-weight: 600; font-size: 14px; color: #303133; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ selectedQuestion.title || '(无标题)' }}</span>
                                            <el-tag type="primary" size="small">{{ selectedQuestion.max_score || 10 }} 分</el-tag>
                                        </div>
                                        <el-collapse>
                                            <el-collapse-item title="题目 / 答案 / 评分脚本">
                                                <div style="margin-bottom: 8px;">
                                                    <div style="font-size: 12px; color: #909399; margin-bottom: 4px;">题目内容</div>
                                                    <div style="padding: 8px; background: #fff; border-radius: 4px; font-size: 13px; color: #606266; white-space: pre-wrap; max-height: 100px; overflow-y: auto; border: 1px solid #ebeef5;">{{ selectedQuestion.content }}</div>
                                                </div>
                                                <div style="margin-bottom: 8px;">
                                                    <div style="font-size: 12px; color: #909399; margin-bottom: 4px;">标准答案</div>
                                                    <div style="padding: 8px; background: #fff; border-radius: 4px; font-size: 13px; color: #67c23a; white-space: pre-wrap; max-height: 80px; overflow-y: auto; border: 1px solid #ebeef5;">{{ selectedQuestion.standard_answer || '(无标准答案)' }}</div>
                                                </div>
                                                <div>
                                                    <div style="font-size: 12px; color: #909399; margin-bottom: 4px;">评分脚本</div>
                                                    <el-input type="textarea" :model-value="selectedQuestion.rubric_script || '(未生成评分脚本)'" :rows="3" readonly size="small"></el-input>
                                                    <el-button size="small" text type="primary" style="margin-top: 4px;" @click="copyRubricScript">
                                                        <el-icon><CopyDocument /></el-icon> 复制评分脚本
                                                    </el-button>
                                                </div>
                                            </el-collapse-item>
                                        </el-collapse>
                                    </div>
                                </template>

                                <!-- 手动输入（未选题时显示） -->
                                <template v-if="!selectedQuestionId">
                                    <div style="margin-bottom: 16px;">
                                        <div style="font-size: 13px; color: #606266; margin-bottom: 6px;">题目</div>
                                        <el-input v-model="manualQuestion" type="textarea" :rows="3" placeholder="请输入简答题题目..."></el-input>
                                    </div>
                                    <div style="margin-bottom: 16px;">
                                        <div style="font-size: 13px; color: #606266; margin-bottom: 6px;">评分规则 (JSON格式)</div>
                                        <el-input v-model="manualRubric" type="textarea" :rows="3" placeholder='{"points": [{"description": "要点1", "score": 5}]}'></el-input>
                                        <div style="font-size: 12px; color: #909399; margin-top: 4px;">支持JSON格式，包含得分要点和关键词</div>
                                    </div>
                                    <div style="margin-bottom: 16px;">
                                        <div style="font-size: 13px; color: #606266; margin-bottom: 6px;">满分</div>
                                        <el-input-number v-model="manualMaxScore" :min="1" :max="100" style="width: 100%;"></el-input-number>
                                    </div>
                                </template>

                                <!-- 学生答案 -->
                                <div style="margin-bottom: 16px;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                                        <div style="font-size: 13px; color: #606266;">学生答案</div>
                                        <el-button v-if="selectedQuestionId" size="small" text type="primary" :loading="genAnswerLoading" @click="generateAnswer">
                                            <el-icon><MagicStick /></el-icon> AI 生成答案
                                        </el-button>
                                    </div>
                                    <el-input v-model="studentAnswer" type="textarea" :rows="6" placeholder="请输入学生的答案..."></el-input>
                                    <div class="answer-count">{{ studentAnswer.length }} 字</div>
                                </div>

                                <el-button type="primary" style="width: 100%;" :loading="grading" @click="gradeAnswer">
                                    <el-icon><Promotion /></el-icon> 开始评分
                                </el-button>
                            </div>
                        </div>

                        <!-- 折叠时的展开按钮 -->
                        <el-button v-if="inputCollapsed" @click="inputCollapsed = false" style="flex-shrink: 0; height: auto; padding: 20px 8px; writing-mode: vertical-lr; letter-spacing: 2px;">
                            <el-icon><DArrowRight /></el-icon> 展开输入
                        </el-button>

                        <!-- 右侧结果区 -->
                        <div style="flex: 1; min-width: 0;">
                            <div class="page-card" style="margin-bottom: 0;">
                                <div style="font-size: 16px; font-weight: 600; color: #303133; margin-bottom: 16px;">评分结果</div>

                                <!-- 空状态 -->
                                <div v-if="!gradeResult" style="text-align: center; padding: 60px 20px; color: #909399;">
                                    <el-icon size="64" color="#c0c4cc"><Document /></el-icon>
                                    <p style="margin-top: 12px;">提交评分后将在此显示结果</p>
                                </div>

                                <!-- 评分结果 -->
                                <template v-if="gradeResult">
                                    <!-- 分数 -->
                                    <div style="text-align: center; padding: 20px 0;">
                                        <template v-if="gradeResult.score === null || gradeResult.score === undefined">
                                            <div class="result-score" style="color: #f56c6c;">评分异常 <span style="font-size: 20px;">需人工处理</span></div>
                                        </template>
                                        <template v-else>
                                            <div class="result-score">{{ gradeResult.score }} <span class="unit">/ {{ currentMaxScore }} 分</span></div>
                                            <div class="score-bar-wrap">
                                                <el-progress :percentage="Math.round(gradeResult.score / currentMaxScore * 100)" :stroke-width="10" :color="scoreColor"></el-progress>
                                            </div>
                                        </template>
                                    </div>

                                    <!-- 置信度 -->
                                    <div style="text-align: center; margin-bottom: 16px;">
                                        <el-tag :type="gradeResult.confidence >= 0.8 ? 'success' : gradeResult.confidence >= 0.6 ? 'warning' : 'danger'" size="large">
                                            置信度 {{ (gradeResult.confidence * 100).toFixed(1) }}%
                                        </el-tag>
                                    </div>

                                    <!-- 预警 -->
                                    <el-alert v-if="gradeResult.warning" :title="gradeResult.warning" type="warning" show-icon :closable="false" style="margin-bottom: 12px;"></el-alert>
                                    <el-alert v-if="gradeResult.needs_review && !gradeResult.warning" title="建议人工复核" type="warning" show-icon :closable="false" style="margin-bottom: 12px;"></el-alert>

                                    <!-- 评语 -->
                                    <div v-if="gradeResult.comment" style="margin-bottom: 16px;">
                                        <div style="font-size: 14px; font-weight: 600; color: #303133; margin-bottom: 8px;">📝 评语</div>
                                        <div style="background: #f5f7fa; border-radius: 8px; padding: 12px; color: #606266; line-height: 1.6; white-space: pre-wrap;">{{ gradeResult.comment }}</div>
                                    </div>

                                    <!-- 原始详情 -->
                                    <el-collapse v-if="gradeResult.details" style="margin-bottom: 16px;">
                                        <el-collapse-item title="查看原始评分详情">
                                            <pre style="background: #f5f7fa; padding: 12px; border-radius: 4px; font-size: 12px; color: #909399; max-height: 200px; overflow-y: auto; white-space: pre-wrap;">{{ JSON.stringify(gradeResult.details, null, 2) }}</pre>
                                        </el-collapse-item>
                                    </el-collapse>

                                    <!-- 底部信息 + 操作 -->
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <span style="font-size: 12px; color: #c0c4cc;">引擎: {{ gradeResult.model_used || 'qwen-agent' }} · 记录ID: {{ gradeResult.record_id }}</span>
                                        <el-button v-if="selectedQuestionId" type="success" size="small" @click="saveAsTestCase">
                                            <el-icon><FolderAdd /></el-icon> 保存为测试用例
                                        </el-button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ========== 测试集 ========== -->
                <template v-if="currentPage === 'testset'">
                    <div class="page-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                            <div>
                                <span style="font-size: 16px; font-weight: 600; color: #303133;">测试集</span>
                                <el-tag v-if="selectedQuestion" size="small" style="margin-left: 8px;">{{ selectedQuestion.title || '#' + selectedQuestion.id }}</el-tag>
                            </div>
                            <div v-if="selectedQuestionId" style="display: flex; gap: 8px;">
                                <el-button type="primary" size="small" @click="showGenDialog = true">
                                    <el-icon><MagicStick /></el-icon> 自动生成
                                </el-button>
                                <el-button size="small" :disabled="selectedCaseIds.length === 0" @click="runSelectedCases">
                                    运行选中项<span v-if="selectedCaseIds.length > 0"> ({{ selectedCaseIds.length }})</span>
                                </el-button>
                                <el-button size="small" :disabled="testCases.length === 0" @click="runAllCases">全部运行</el-button>
                            </div>
                        </div>

                        <!-- 未选题提示 -->
                        <el-empty v-if="!selectedQuestionId" description="请先在「单题评分」中选择题目"></el-empty>

                        <!-- 测试用例表格 -->
                        <template v-if="selectedQuestionId">
                            <el-empty v-if="testCases.length === 0" description="该题目暂无测试用例"></el-empty>
                            <el-table v-else :data="testCases" style="width: 100%;" @selection-change="onCaseSelectionChange">
                                <el-table-column type="selection" width="40"></el-table-column>
                                <el-table-column prop="description" label="描述" show-overflow-tooltip min-width="150"></el-table-column>
                                <el-table-column label="类型" width="70">
                                    <template #default="scope">
                                        <el-tag :type="scope.row.case_type === 'real' ? 'success' : 'warning'" size="small">
                                            {{ scope.row.case_type === 'real' ? '真实' : '模拟' }}
                                        </el-tag>
                                    </template>
                                </el-table-column>
                                <el-table-column label="期望分" width="80">
                                    <template #default="scope">
                                        <strong>{{ scope.row.expected_score }}</strong>
                                    </template>
                                </el-table-column>
                                <el-table-column label="实际分" width="80">
                                    <template #default="scope">
                                        {{ scope.row.last_actual_score !== null && scope.row.last_actual_score !== undefined ? scope.row.last_actual_score : '-' }}
                                    </template>
                                </el-table-column>
                                <el-table-column label="误差" width="70">
                                    <template #default="scope">
                                        <span v-if="scope.row.last_run_at" :style="{ color: scope.row.last_error > 1 ? '#f56c6c' : scope.row.last_error > 0.5 ? '#e6a23c' : '#67c23a' }">
                                            {{ scope.row.last_error !== null && scope.row.last_error !== undefined ? parseFloat(scope.row.last_error).toFixed(1) : '-' }}
                                        </span>
                                        <span v-else>-</span>
                                    </template>
                                </el-table-column>
                                <el-table-column label="操作" width="150" fixed="right">
                                    <template #default="scope">
                                        <el-button size="small" type="primary" link @click="gradeTestCase(scope.row)" title="用此答案评分">
                                            <el-icon><EditPen /></el-icon>
                                        </el-button>
                                        <el-button size="small" type="primary" link @click="runSingleCase(scope.row.id)" title="运行">
                                            <el-icon><VideoPlay /></el-icon>
                                        </el-button>
                                        <el-button size="small" type="danger" link @click="deleteTestCase(scope.row.id)" title="删除">
                                            <el-icon><Delete /></el-icon>
                                        </el-button>
                                    </template>
                                </el-table-column>
                            </el-table>

                            <!-- 进度条 -->
                            <div v-if="testSetRunning" style="margin-top: 16px;">
                                <el-progress :percentage="testSetProgress" :stroke-width="8" :status="testSetProgress >= 100 ? 'success' : ''"></el-progress>
                                <div style="text-align: center; margin-top: 8px; font-size: 13px; color: #909399;">{{ testSetText }}</div>
                            </div>
                        </template>
                    </div>

                    <!-- 自动生成参数对话框 -->
                    <el-dialog v-model="showGenDialog" title="自动生成测试用例" width="520px" :close-on-click-modal="false">
                        <div style="margin-bottom: 16px;">
                            <div style="font-size: 13px; color: #606266; margin-bottom: 6px;">生成数量</div>
                            <el-slider v-model="genCount" :min="3" :max="20" show-input></el-slider>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <div style="font-size: 13px; color: #606266; margin-bottom: 6px;">分数分布策略</div>
                            <el-radio-group v-model="genDist">
                                <el-radio value="gradient">
                                    <div><strong>梯度分布</strong><div style="font-size: 12px; color: #909399;">满分→中等→低分→零分</div></div>
                                </el-radio>
                                <el-radio value="edge">
                                    <div><strong>边界为主</strong><div style="font-size: 12px; color: #909399;">重点覆盖满分/零分/临界分</div></div>
                                </el-radio>
                                <el-radio value="middle">
                                    <div><strong>中段为主</strong><div style="font-size: 12px; color: #909399;">重点覆盖中等水平作答</div></div>
                                </el-radio>
                                <el-radio value="uniform">
                                    <div><strong>均匀分布</strong><div style="font-size: 12px; color: #909399;">各分数段均匀覆盖</div></div>
                                </el-radio>
                            </el-radio-group>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <div style="font-size: 13px; color: #606266; margin-bottom: 6px;">模拟作答风格（可多选）</div>
                            <el-checkbox-group v-model="genStyles">
                                <el-checkbox value="标准规范">标准规范</el-checkbox>
                                <el-checkbox value="口语化">口语化</el-checkbox>
                                <el-checkbox value="要点遗漏">要点遗漏</el-checkbox>
                                <el-checkbox value="偏题跑题">偏题跑题</el-checkbox>
                                <el-checkbox value="复制原文">复制原文</el-checkbox>
                                <el-checkbox value="空白作答">空白作答</el-checkbox>
                            </el-checkbox-group>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <div style="font-size: 13px; color: #606266; margin-bottom: 6px;">补充要求（可选）</div>
                            <el-input v-model="genExtra" type="textarea" :rows="2" placeholder="例如：重点测试反作弊规则、增加方言化表达..."></el-input>
                        </div>
                        <template #footer>
                            <el-button @click="showGenDialog = false">取消</el-button>
                            <el-button type="primary" :loading="genRunning" @click="autoGenerateTestCases">开始生成</el-button>
                        </template>
                    </el-dialog>
                </template>

                <!-- ========== 历史记录 ========== -->
                <template v-if="currentPage === 'history'">
                    <div class="page-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                            <span style="font-size: 16px; font-weight: 600; color: #303133;">评分历史</span>
                            <el-button size="small" @click="clearHistory">
                                <el-icon><Delete /></el-icon> 清空历史
                            </el-button>
                        </div>
                        <el-empty v-if="history.length === 0" description="暂无评分记录"></el-empty>
                        <el-timeline v-else>
                            <el-timeline-item v-for="(item, idx) in history" :key="idx" :timestamp="item.time" placement="top" :type="item.score !== null ? 'primary' : 'danger'">
                                <el-card shadow="hover" style="margin-bottom: 0;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                        <el-tag :type="item.score !== null ? 'primary' : 'danger'" size="large">
                                            {{ item.score !== null ? item.score + ' 分' : '评分异常' }}
                                        </el-tag>
                                        <el-tag :type="item.confidence >= 0.8 ? 'success' : item.confidence >= 0.6 ? 'warning' : 'danger'" size="small">
                                            置信度 {{ (item.confidence * 100).toFixed(1) }}%
                                        </el-tag>
                                    </div>
                                    <div style="font-size: 13px; color: #606266; line-height: 1.5;">{{ item.question }}</div>
                                </el-card>
                            </el-timeline-item>
                        </el-timeline>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, reactive, computed, onMounted } = Vue;
const { ElMessage, ElMessageBox } = ElementPlus;

const app = createApp({
    setup() {
        const API_BASE = window.location.origin;

        // ========== 页面状态 ==========
        const currentPage = ref('single');
        const inputCollapsed = ref(false);
        const sidebarCollapsed = ref(false);

        // ========== 模型选择 ==========
        const providers = ref([]);
        const currentProvider = ref('');
        const currentModelLabel = computed(() => {
            const p = providers.value.find(x => x.id === currentProvider.value);
            return p ? p.name + ' · ' + p.model : '';
        });

        async function loadProviders() {
            try {
                const { data } = await axios.get(API_BASE + '/api/providers');
                if (data.success && data.data) {
                    providers.value = data.data;
                    const active = data.data.find(p => p.active) || data.data[0];
                    if (active) currentProvider.value = active.id;
                }
            } catch (e) {
                console.error('加载模型列表失败', e);
            }
        }

        function onProviderChange(val) {
            ElMessage.success('已切换到：' + currentModelLabel.value);
        }

        // ========== 题目选择 ==========
        const questionList = ref([]);
        const selectedQuestionId = ref(null);
        const selectedQuestion = ref(null);
        const loadingQuestions = ref(false);

        async function loadQuestionList() {
            loadingQuestions.value = true;
            try {
                const { data } = await axios.get(API_BASE + '/api/questions');
                if (data.success && data.data) {
                    questionList.value = data.data;
                }
            } catch (e) {
                console.error('加载题目列表失败', e);
            }
            loadingQuestions.value = false;
        }

        async function onQuestionSelect(qid) {
            if (!qid) {
                selectedQuestion.value = null;
                return;
            }
            try {
                const { data } = await axios.get(API_BASE + '/api/questions/' + qid);
                if (data.success && data.data) {
                    selectedQuestion.value = data.data;
                    ElMessage.success('题目已加载: ' + (data.data.title || data.data.content.substring(0, 20)));
                }
            } catch (e) {
                ElMessage.error('加载题目失败');
            }
        }

        // ========== 手动输入 ==========
        const manualQuestion = ref('');
        const manualRubric = ref('');
        const manualMaxScore = ref(10);

        // ========== 学生答案 ==========
        const studentAnswer = ref('');

        // ========== 当前满分 ==========
        const currentMaxScore = computed(() => {
            if (selectedQuestion.value) return selectedQuestion.value.max_score || 10;
            return manualMaxScore.value;
        });

        // ========== 评分 ==========
        const grading = ref(false);
        const gradeResult = ref(null);

        async function gradeAnswer() {
            if (!studentAnswer.value.trim()) {
                ElMessage.warning('请填写学生答案');
                return;
            }

            grading.value = true;
            let requestBody;

            if (selectedQuestionId.value) {
                requestBody = { question_id: selectedQuestionId.value, answer: studentAnswer.value.trim(), provider: currentProvider.value };
            } else {
                if (!manualQuestion.value.trim()) {
                    ElMessage.warning('请填写题目');
                    grading.value = false;
                    return;
                }
                let rubric = {};
                if (manualRubric.value.trim()) {
                    try { rubric = JSON.parse(manualRubric.value); }
                    catch (e) { ElMessage.error('评分规则JSON格式错误'); grading.value = false; return; }
                }
                requestBody = { question: manualQuestion.value, answer: studentAnswer.value.trim(), rubric, max_score: manualMaxScore.value, provider: currentProvider.value };
            }

            try {
                const { data: result } = await axios.post(API_BASE + '/api/grade', requestBody);
                if (result.success) {
                    const d = result.data;
                    if (d.score === null || d.score === undefined) {
                        try {
                            await ElMessageBox.confirm(d.comment || '评分系统暂时无法评分', '评分异常', { confirmButtonText: '重新评分', cancelButtonText: '联系监考老师', type: 'warning' });
                            grading.value = false;
                            gradeAnswer();
                            return;
                        } catch {
                            ElMessage.warning('请通知监考老师进行人工评分');
                        }
                    } else {
                        ElMessage.success('评分完成');
                    }
                    gradeResult.value = d;
                    addToHistory(requestBody, d);
                } else {
                    ElMessage.error(result.error || '评分失败');
                }
            } catch (e) {
                ElMessage.error('评分失败：后端服务未启动');
            }
            grading.value = false;
        }

        // ========== 评分辅助 ==========
        const scoreColor = computed(() => {
            if (!gradeResult.value || gradeResult.value.score === null) return '#909399';
            const pct = gradeResult.value.score / currentMaxScore.value * 100;
            if (pct >= 80) return '#67c23a';
            if (pct >= 60) return '#e6a23c';
            return '#f56c6c';
        });

        function copyRubricScript() {
            if (!selectedQuestion.value || !selectedQuestion.value.rubric_script) {
                ElMessage.warning('没有可复制的评分脚本');
                return;
            }
            navigator.clipboard.writeText(selectedQuestion.value.rubric_script).then(() => {
                ElMessage.success('已复制到剪贴板');
            }).catch(() => {
                ElMessage.error('复制失败，请手动选择复制');
            });
        }

        async function saveAsTestCase() {
            if (!selectedQuestionId.value || !gradeResult.value) {
                ElMessage.warning('没有可保存的评分结果');
                return;
            }
            try {
                const { data } = await axios.post(API_BASE + '/api/questions/' + selectedQuestionId.value + '/test-cases', {
                    answer_text: studentAnswer.value.trim(),
                    expected_score: gradeResult.value.score,
                    description: '来自评分页面 ' + new Date().toLocaleString('zh-CN'),
                    case_type: 'real'
                });
                if (data.success) {
                    ElMessage.success('已保存为测试用例（期望分 ' + gradeResult.value.score + '）');
                } else {
                    ElMessage.error(data.error || '保存失败');
                }
            } catch (e) {
                ElMessage.error('保存失败：' + e.message);
            }
        }

        // ========== AI 生成答案 ==========
        const genAnswerLoading = ref(false);

        async function generateAnswer() {
            if (!selectedQuestionId.value) {
                ElMessage.warning('请先选择题目');
                return;
            }
            genAnswerLoading.value = true;
            try {
                const { data } = await axios.post(API_BASE + '/api/generate-answer', {
                    question_id: selectedQuestionId.value
                });
                if (data.success) {
                    studentAnswer.value = data.data.answer;
                    gradeResult.value = null;
                    ElMessage.success('已生成「' + data.data.level + '」水平的模拟答案（目标约 ' + data.data.target_score + ' 分）');
                } else {
                    ElMessage.error(data.error || '生成失败');
                }
            } catch (e) {
                ElMessage.error('生成失败：' + e.message);
            }
            genAnswerLoading.value = false;
        }

        // ========== 测试集 ==========
        const testCases = ref([]);
        const selectedCaseIds = ref([]);
        const testSetRunning = ref(false);
        const testSetProgress = ref(0);
        const testSetText = ref('');

        async function loadTestCases() {
            if (!selectedQuestionId.value) { testCases.value = []; return; }
            try {
                const { data } = await axios.get(API_BASE + '/api/questions/' + selectedQuestionId.value + '/test-cases');
                if (data.success) testCases.value = data.data || [];
            } catch (e) {
                console.error('加载测试用例失败', e);
            }
        }

        function onCaseSelectionChange(rows) {
            selectedCaseIds.value = rows.map(r => r.id);
        }

        function gradeTestCase(tc) {
            studentAnswer.value = tc.answer_text;
            gradeResult.value = null;
            currentPage.value = 'single';
            ElMessage.info('已载入测试用例答案：' + (tc.description || '期望分 ' + tc.expected_score));
        }

        async function runSingleCase(caseId) {
            if (testSetRunning.value || !selectedQuestionId.value) return;
            const tc = testCases.value.find(c => c.id === caseId);
            if (!tc) return;
            testSetRunning.value = true;
            try {
                const { data: result } = await axios.post(API_BASE + '/api/grade', {
                    question_id: selectedQuestionId.value,
                    answer: tc.answer_text,
                    provider: currentProvider.value
                });
                if (result.success && result.data && result.data.score !== null) {
                    const actualScore = result.data.score;
                    const error = Math.abs(actualScore - tc.expected_score);
                    await axios.put(API_BASE + '/api/questions/' + selectedQuestionId.value + '/test-cases/' + caseId, {
                        last_actual_score: actualScore, last_error: error, last_run_at: new Date().toISOString()
                    });
                    ElMessage.success('测试用例运行完成：' + actualScore + ' 分');
                } else {
                    ElMessage.error('评分失败：' + (result.data?.comment || '未知错误'));
                }
            } catch (e) {
                ElMessage.error('运行失败：' + e.message);
            }
            testSetRunning.value = false;
            loadTestCases();
        }

        async function runSelectedCases() {
            const ids = [...selectedCaseIds.value];
            if (ids.length === 0) return;
            testSetRunning.value = true;
            for (let i = 0; i < ids.length; i++) {
                testSetText.value = '运行中... (' + (i + 1) + '/' + ids.length + ')';
                testSetProgress.value = Math.round((i + 1) / ids.length * 100);
                await runSingleCase(ids[i]);
            }
            testSetText.value = '全部完成';
            testSetProgress.value = 100;
            setTimeout(() => { testSetRunning.value = false; }, 2000);
        }

        async function runAllCases() {
            if (testCases.value.length === 0) return;
            testSetRunning.value = true;
            for (let i = 0; i < testCases.value.length; i++) {
                testSetText.value = '运行中... (' + (i + 1) + '/' + testCases.value.length + ')';
                testSetProgress.value = Math.round((i + 1) / testCases.value.length * 100);
                await runSingleCase(testCases.value[i].id);
            }
            testSetText.value = '全部完成';
            testSetProgress.value = 100;
            setTimeout(() => { testSetRunning.value = false; }, 2000);
        }

        async function deleteTestCase(caseId) {
            if (!selectedQuestionId.value) return;
            try {
                await ElMessageBox.confirm('确定删除此测试用例？', '确认', { type: 'warning' });
                await axios.delete(API_BASE + '/api/questions/' + selectedQuestionId.value + '/test-cases/' + caseId);
                ElMessage.success('已删除');
                loadTestCases();
            } catch (e) {
                // 用户取消
            }
        }

        // ========== 自动生成 ==========
        const showGenDialog = ref(false);
        const genCount = ref(7);
        const genDist = ref('gradient');
        const genStyles = ref(['标准规范', '口语化', '要点遗漏']);
        const genExtra = ref('');
        const genRunning = ref(false);

        async function autoGenerateTestCases() {
            if (!selectedQuestionId.value) return;
            if (genStyles.value.length === 0) {
                ElMessage.warning('请至少选择一种作答风格');
                return;
            }
            genRunning.value = true;
            showGenDialog.value = false;
            try {
                const { data } = await axios.post(API_BASE + '/api/questions/' + selectedQuestionId.value + '/generate-test-cases', {
                    count: genCount.value,
                    distribution: genDist.value,
                    styles: genStyles.value,
                    extra: genExtra.value.trim()
                });
                if (data.success) {
                    ElMessage.success('已生成 ' + data.data.count + ' 个测试用例');
                    loadTestCases();
                } else {
                    ElMessage.error('生成失败：' + (data.error || '未知错误'));
                }
            } catch (e) {
                ElMessage.error('生成失败：' + e.message);
            }
            genRunning.value = false;
        }

        // ========== 历史记录 ==========
        const history = ref([]);

        function addToHistory(requestBody, data) {
            let questionText = requestBody.question || '';
            if (!questionText && selectedQuestion.value) questionText = selectedQuestion.value.content || '';
            if (!questionText) questionText = '(题库题目 #' + requestBody.question_id + ')';
            history.value.unshift({
                question: questionText.substring(0, 80),
                answer: (requestBody.answer || '').substring(0, 50) + '...',
                score: data.score,
                confidence: data.confidence || 0,
                time: new Date().toLocaleString()
            });
            if (history.value.length > 50) history.value.pop();
            localStorage.setItem('grading-history', JSON.stringify(history.value));
        }

        async function loadHistoryFromApi() {
            try {
                const { data } = await axios.get(API_BASE + '/api/history?limit=50');
                if (data.success && data.data) {
                    history.value = data.data.map(r => ({
                        question: (r.student_answer || '').substring(0, 80),
                        score: r.score,
                        confidence: r.confidence || 0,
                        time: r.graded_at || ''
                    }));
                }
            } catch (e) {
                history.value = JSON.parse(localStorage.getItem('grading-history') || '[]');
            }
        }

        function clearHistory() {
            history.value = [];
            localStorage.removeItem('grading-history');
            ElMessage.success('历史已清空');
        }

        // ========== 页面切换 ==========
        function handleMenuSelect(page) {
            currentPage.value = page;
            if (page === 'testset') loadTestCases();
            if (page === 'history') loadHistoryFromApi();
        }

        // ========== 初始化 ==========
        onMounted(async () => {
            await loadProviders();
            await loadQuestionList();
            await loadHistoryFromApi();

            // 从 URL 参数加载题目
            const params = new URLSearchParams(window.location.search);
            const qid = params.get('question_id');
            if (qid) {
                selectedQuestionId.value = parseInt(qid);
                await onQuestionSelect(parseInt(qid));
            }
        });

        return {
            currentPage, inputCollapsed, sidebarCollapsed,
            providers, currentProvider, currentModelLabel, onProviderChange,
            questionList, selectedQuestionId, selectedQuestion, loadingQuestions,
            loadQuestionList, onQuestionSelect,
            manualQuestion, manualRubric, manualMaxScore,
            studentAnswer, currentMaxScore,
            grading, gradeResult, gradeAnswer, scoreColor,
            genAnswerLoading, generateAnswer,
            copyRubricScript, saveAsTestCase,
            testCases, selectedCaseIds, testSetRunning, testSetProgress, testSetText,
            loadTestCases, onCaseSelectionChange, gradeTestCase, runSingleCase, runSelectedCases, runAllCases, deleteTestCase,
            showGenDialog, genCount, genDist, genStyles, genExtra, genRunning, autoGenerateTestCases,
            history, loadHistoryFromApi, clearHistory,
            handleMenuSelect
        };
    }
});

app.use(ElementPlus);
app.mount('#app');
</script>
</body>
</html>
