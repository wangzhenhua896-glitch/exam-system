<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 命题系统 - 单题评分</title>
    <link rel="stylesheet" href="/static/vendor/element-plus.css">
    <link rel="stylesheet" href="/static/css/shared.css">
    <script src="/static/vendor/vue.global.prod.js"></script>
    <script src="/static/vendor/element-plus.js"></script>
    <script src="/static/vendor/element-plus-icons.js"></script>
    <script src="/static/vendor/axios.min.js"></script>
    <script src="/static/vendor/dompurify.min.js"></script>
    <script src="/static/js/shared.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", PingFang SC, "Microsoft YaHei", sans-serif; background: #f5f7fa; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #e4e7ed; overflow-y: auto; display: flex; flex-direction: column; transition: width 0.25s ease, opacity 0.25s ease; }
        .sidebar.collapsed { width: 0; overflow: hidden; opacity: 0; }
        .sidebar-nav { flex: 1; }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid #e4e7ed; }
        .content { flex: 1; padding: 20px; overflow-y: auto; background: #f5f7fa; }
        .result-score { font-size: 56px; font-weight: 700; color: #409EFF; text-align: center; }
        .result-score .unit { font-size: 20px; color: #909399; font-weight: 400; }
        .score-bar-wrap { margin: 16px auto 0; max-width: 400px; }
        .answer-count { font-size: 12px; color: #909399; text-align: right; margin-top: 4px; }
    </style>
</head>
<body>
<div id="app">
    <div class="layout">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="header-left">
                <el-button text @click="sidebarCollapsed = !sidebarCollapsed" style="font-size: 18px; padding: 4px 8px;">
                    <el-icon><Fold /></el-icon>
                </el-button>
                <div class="logo">📝 AI 命题系统</div>
                <div class="subtitle">国产大模型 · 高精度评分</div>
            </div>
            <div class="header-right">
                <el-tag size="small" type="info">{{ currentModelLabel || '未选择模型' }}</el-tag>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span>系统就绪</span>
                </div>
                <el-tag size="small" type="primary">单题评分</el-tag>
            </div>
        </div>

        <div class="main-container">
            <!-- 左侧导航 -->
            <div class="sidebar" :class="{ collapsed: sidebarCollapsed }">
                <div class="sidebar-nav">
                    <el-menu :default-active="currentPage" @select="handleMenuSelect">
                        <el-menu-item index="single"><el-icon><EditPen /></el-icon><span>单题评分</span></el-menu-item>
                        <el-menu-item index="testset"><el-icon><List /></el-icon><span>测试集</span></el-menu-item>
                        <el-menu-item index="anticheat"><el-icon><WarningFilled /></el-icon><span>反作弊测试</span></el-menu-item>
                        <el-menu-item index="history"><el-icon><Clock /></el-icon><span>历史记录</span></el-menu-item>
                    </el-menu>
                    <div style="padding: 12px 16px;">
                        <div style="font-size: 12px; color: #909399; margin-bottom: 6px;">当前题目</div>
                        <el-select v-model="selectedQuestionId" filterable clearable placeholder="-- 手动输入 --" size="small" style="width: 100%;" :loading="loadingQuestions" @change="onQuestionSelect">
                            <template v-for="q in questionList" :key="q.id">
                                <el-option-group v-if="q._isParent && q._children && q._children.length > 0" :label="q.title || (q.content || '').substring(0, 30)">
                                    <el-option :label="'#' + q.id + ' [' + getSubjectLabel(q.subject) + '] ' + (q.title || (q.content || '').substring(0, 30))" :value="q.id"></el-option>
                                    <el-option v-for="c in q._children" :key="c.id" :label="'  └ #' + c.id + ' [' + getSubjectLabel(c.subject) + '] ' + (c.title || (c.content || '').substring(0, 30))" :value="c.id"></el-option>
                                </el-option-group>
                                <el-option v-else-if="!q._isChild" :label="'#' + q.id + ' [' + getSubjectLabel(q.subject) + '] ' + (q.title || (q.content || '').substring(0, 30))" :value="q.id"></el-option>
                            </template>
                        </el-select>
                        <div v-if="selectedQuestion" style="font-size: 12px; color: #409EFF; margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ selectedQuestion.title || selectedQuestion.content.substring(0, 40) }}</div>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <div style="margin-bottom: 8px;">
                        <div style="font-size: 12px; color: #909399; margin-bottom: 6px;">当前模型</div>
                        <el-select v-model="currentModelId" size="small" style="width: 100%;" @change="onModelChange">
                            <el-option-group v-for="g in modelGroups" :key="g.name" :label="g.name">
                                <el-option v-for="m in g.models" :key="m.id" :label="m.display_name" :value="m.id"></el-option>
                            </el-option-group>
                        </el-select>
                    </div>
                    <a href="/management" style="text-decoration: none;">
                        <el-button size="small" plain style="width: 100%;"><el-icon><Back /></el-icon> 返回题库管理</el-button>
                    </a>
                </div>
            </div>

            <!-- 右侧内容区 -->
            <div class="content">
                <!-- ========== 单题评分 ========== -->
                <template v-if="currentPage === 'single'">
                    <!-- 从测试集载入用例的提示条 -->
                    <div v-if="loadedTestCaseInfo" style="padding: 8px 16px; background: #fdf6ec; border: 1px solid #faecd8; border-radius: 6px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 13px; color: #e6a23c;">
                            已载入测试用例（期望分 {{ loadedTestCaseInfo.expected_score }}）
                            <span v-if="loadedTestCaseInfo.description" style="color: #909399;"> — {{ loadedTestCaseInfo.description }}</span>
                        </span>
                        <el-button size="small" text @click="loadedTestCaseInfo = null; handleMenuSelect('testset')">返回测试集</el-button>
                    </div>
                    <div style="display: flex; gap: 20px; align-items: flex-start;">
                        <!-- 左侧输入区 -->
                        <div :style="{ width: inputCollapsed ? '0' : ((grading || gradeResult) && !resultCollapsed ? '400px' : '100%'), overflow: 'hidden', transition: 'width 0.25s', flexShrink: 0 }">
                            <div class="page-card" style="margin-bottom: 0;">
                                <!-- 选题后：评分脚本 + 题目/答案折叠 -->
                                <template v-if="selectedQuestion">
                                    <div style="margin-bottom: 20px;">
                                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                                            <span style="font-size: 14px; font-weight: 600; color: #303133;">
                                                评分脚本
                                                <el-tag v-if="scriptVersion > 0" size="small" type="info" style="margin-left: 6px; cursor: pointer; font-size: 11px;" @click="openScriptHistory">
                                                    v{{ scriptVersion }}
                                                </el-tag>
                                                <el-tag v-else-if="selectedQuestion.rubric_script" size="small" type="info" style="margin-left: 6px; font-size: 11px;">
                                                    v1
                                                </el-tag>
                                            </span>
                                            <div style="display: flex; gap: 4px; align-items: center;">
                                                <el-button v-if="!rubricEditing" size="small" text type="primary" style="font-size: 12px;" @click="startRubricEdit">
                                                    <el-icon><Edit /></el-icon> 编辑
                                                </el-button>
                                                <el-button size="small" text style="font-size: 12px; color: #909399;" @click="openScriptHistory">
                                                    <el-icon><Clock /></el-icon> 历史
                                                </el-button>
                                                <el-button size="small" text style="font-size: 12px; color: #909399;" @click="copyRubricScript">
                                                    <el-icon><CopyDocument /></el-icon> 复制
                                                </el-button>
                                                <el-button size="small" text style="font-size: 12px; color: #909399;" @click="toggleRubricFontSize">
                                                    <span style="font-weight: 700;">A</span>
                                                    <span style="font-size: 10px; margin-left: 1px;">{{ rubricFontSize }}px</span>
                                                </el-button>
                                                <el-button size="small" text style="font-size: 12px; color: #909399;" @click="toggleRubricFullscreen">
                                                    <el-icon v-if="!rubricFullscreen"><FullScreen /></el-icon>
                                                    <el-icon v-else><CloseBold /></el-icon>
                                                    {{ rubricFullscreen ? '还原' : '铺满' }}
                                                </el-button>
                                                <el-button size="small" text @click="inputCollapsed = true" style="font-size: 12px; color: #909399;">
                                                    <el-icon><DArrowLeft /></el-icon> 折叠
                                                </el-button>
                                            </div>
                                        </div>
                                        <!-- 只读模式 -->
                                        <el-input ref="rubricTextareaRef" v-if="!rubricEditing" type="textarea" :model-value="selectedQuestion.rubric_script || '(未生成评分脚本)'"
                                            :readonly="true"
                                            :rows="rubricFullscreen ? 25 : 10" size="small"
                                            :input-style="{ resize: 'vertical', minHeight: rubricFullscreen ? '500px' : '120px', maxHeight: rubricFullscreen ? '90vh' : '600px', fontFamily: 'Menlo, Monaco, Consolas, monospace', fontSize: rubricFontSize + 'px', lineHeight: '1.7', color: '#303133' }">
                                        </el-input>
                                        <!-- 编辑模式 -->
                                        <template v-if="rubricEditing">
                                            <el-input v-model="rubricEditValue" type="textarea"
                                                :rows="rubricFullscreen ? 25 : 12" size="small"
                                                :input-style="{ resize: 'vertical', minHeight: rubricFullscreen ? '500px' : '160px', maxHeight: rubricFullscreen ? '90vh' : '600px', fontFamily: 'Menlo, Monaco, Consolas, monospace', fontSize: rubricFontSize + 'px', lineHeight: '1.7', color: '#303133' }">
                                            </el-input>
                                            <div style="margin-top: 8px; display: flex; gap: 8px;">
                                                <el-button size="small" type="primary" @click="saveRubricEdit">保存</el-button>
                                                <el-button size="small" @click="cancelRubricEdit">取消</el-button>
                                            </div>
                                            <div style="margin-top: 8px; padding: 10px 12px; background: #f0f9ff; border-radius: 6px; font-size: 12px; color: #909399; line-height: 1.8;">
                                                <div style="font-weight: 600; color: #606266; margin-bottom: 4px;">评分脚本格式提示</div>
                                                按以下结构编写，每个得分点用 <b>【得分点1】</b> 或 <b>Scoring Point 1</b> 开头，系统会自动解析分段展示：<br>
                                                1.【题目信息】— 题目复述和满分值<br>
                                                2.【标准答案要点】— 每个要点含核心含义 + 关键词<br>
                                                3.【逐项评分规则】— 每个得分点的得分/不得分条件<br>
                                                4.【反作弊规则】— 复制题干、空白等判0分条件<br>
                                                5.【总分计算】— 总分 = 各项之和，范围 [0, 满分]
                                            </div>
                                        </template>
                                    </div>
                                    <!-- 父题阅读材料（子题时显示） -->
                                    <div v-if="selectedQuestion.parent_id && parentPassage" style="margin-bottom: 16px; padding: 12px; background: #fdf6ec; border: 1px solid #faecd8; border-radius: 6px;">
                                        <div style="font-size: 12px; font-weight: 600; color: #e6a23c; margin-bottom: 6px;">📖 阅读材料</div>
                                        <div style="font-size: 13px; color: #606266; line-height: 1.8; white-space: pre-wrap; max-height: 2400px; overflow-y: auto;">{{ parentPassage }}</div>
                                    </div>

                                    <el-collapse style="margin-bottom: 20px;">
                                        <el-collapse-item title="题目 / 答案">
                                            <div style="margin-bottom: 10px;">
                                                <div style="font-size: 12px; color: #c0c4cc; margin-bottom: 4px;">{{ selectedQuestion.parent_id ? '小题内容' : '题目内容' }}</div>
                                                <div v-if="selectedQuestion.content_html" style="padding: 12px; background: #fafafa; border-radius: 4px; font-size: 14px; color: #303133; line-height: 1.8; max-height: 2400px; overflow-y: auto;" v-html="sanitizeHtml(selectedQuestion.content_html)"></div>
                                                <div v-else style="padding: 12px; background: #fafafa; border-radius: 4px; font-size: 14px; color: #303133; line-height: 1.8; white-space: pre-wrap; max-height: 2400px; overflow-y: auto;">{{ selectedQuestion.content }}</div>
                                            </div>
                                            <div>
                                                <div style="font-size: 12px; color: #c0c4cc; margin-bottom: 4px;">标准答案</div>
                                                <div style="padding: 12px; background: #fafafa; border-radius: 4px; font-size: 14px; color: #67c23a; line-height: 1.8; white-space: pre-wrap; max-height: 400px; overflow-y: auto;">{{ selectedQuestion.standard_answer || '(无标准答案)' }}</div>
                                            </div>
                                        </el-collapse-item>
                                    </el-collapse>
                                </template>

                                <!-- 手动输入（未选题时显示） -->
                                <template v-if="!selectedQuestionId">
                                    <div style="padding: 16px; background: #f0f9ff; border: 1px solid #b3d8ff; border-radius: 8px; margin-bottom: 16px; text-align: center;">
                                        <div style="font-size: 15px; color: #303133; margin-bottom: 6px;">请先从上方下拉框选择一道题目</div>
                                        <div style="font-size: 13px; color: #909399;">选择题目后将自动加载评分脚本和标准答案，无需手动填写</div>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                                        <span style="font-size: 14px; font-weight: 600; color: #303133;">或者手动输入</span>
                                        <el-button size="small" text @click="inputCollapsed = true" style="font-size: 12px; color: #909399;">
                                            <el-icon><DArrowLeft /></el-icon> 折叠
                                        </el-button>
                                    </div>
                                    <div style="margin-bottom: 16px;">
                                        <div style="font-size: 12px; font-weight: 500; color: #909399; margin-bottom: 6px; letter-spacing: 0.5px;">题目</div>
                                        <el-input v-model="manualQuestion" type="textarea" :rows="3" placeholder="请输入简答题题目..."></el-input>
                                    </div>
                                    <div style="margin-bottom: 16px;">
                                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                                            <div style="font-size: 12px; font-weight: 500; color: #909399; letter-spacing: 0.5px;">评分得分点</div>
                                            <el-button size="small" text type="primary" @click="manualRubricPoints.push({ description: '', score: 0 })">
                                                + 添加得分点
                                            </el-button>
                                        </div>
                                        <div v-for="(pt, idx) in manualRubricPoints" :key="idx" style="display: flex; gap: 8px; margin-bottom: 6px; align-items: center;">
                                            <el-input v-model="pt.description" placeholder="得分点描述（如：答出计算机科学）" style="flex: 1;"></el-input>
                                            <el-input-number v-model="pt.score" :min="0" :max="100" :step="0.5" size="small" style="width: 100px;" placeholder="分值"></el-input-number>
                                            <el-button size="small" text type="danger" @click="manualRubricPoints.splice(idx, 1)" :disabled="manualRubricPoints.length <= 1">
                                                <el-icon><Delete /></el-icon>
                                            </el-button>
                                        </div>
                                    </div>
                                    <div style="margin-bottom: 16px;">
                                        <div style="font-size: 12px; font-weight: 500; color: #909399; margin-bottom: 6px; letter-spacing: 0.5px;">满分</div>
                                        <el-input-number v-model="manualMaxScore" :min="1" :max="100" style="width: 100%;"></el-input-number>
                                    </div>
                                    <div style="margin-bottom: 16px;">
                                        <div style="font-size: 12px; font-weight: 500; color: #909399; margin-bottom: 6px; letter-spacing: 0.5px;">科目</div>
                                        <el-select v-model="manualSubject" style="width: 100%;">
                                            <el-option label="思想政治" value="politics"></el-option>
                                            <el-option label="语文" value="chinese"></el-option>
                                            <el-option label="英语" value="english"></el-option>
                                            <el-option label="通用" value="general"></el-option>
                                        </el-select>
                                    </div>
                                </template>

                                <!-- 学生答案 -->
                                <div style="margin-bottom: 20px;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                                        <div style="font-size: 12px; font-weight: 500; color: #909399; letter-spacing: 0.5px;">学生答案</div>
                                        <el-button v-if="selectedQuestionId" size="small" text type="primary" :loading="genAnswerLoading" @click="generateAnswer">
                                            <el-icon><MagicStick /></el-icon> AI 生成答案
                                        </el-button>
                                    </div>
                                    <el-input v-model="studentAnswer" type="textarea" :rows="6" placeholder="请输入学生的答案..."></el-input>
                                    <div class="answer-count">{{ selectedQuestion?.subject === 'english' ? (studentAnswer.trim().split(/\s+/).filter(Boolean).length + ' words') : (studentAnswer.length + ' 字') }}</div>
                                </div>

                                <div style="display: flex; gap: 8px; align-items: center;">
                                    <div style="display: none;">
                                        <el-select v-model="gradeModelIds" multiple collapse-tags collapse-tags-tooltip placeholder="全部模型" size="default" style="width: 280px; flex-shrink: 0;">
                                            <template #header>
                                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 4px 0;">
                                                    <span style="font-size: 12px; color: #909399;">选择模型（{{ gradeModelIds.length }}/{{ providers.length }}）</span>
                                                    <el-button size="small" text type="primary" @click="gradeModelIds = gradeModelIds.length === providers.length ? [] : providers.map(p => p.id)">
                                                        {{ gradeModelIds.length === providers.length ? '取消全选' : '全选' }}
                                                    </el-button>
                                                </div>
                                            </template>
                                            <el-option v-for="p in providers" :key="p.id" :label="p.name + ' · ' + p.display_name" :value="p.id"></el-option>
                                        </el-select>
                                    </div>
                                    <el-button type="primary" style="flex: 1;" :loading="grading" @click="gradeAnswer">
                                        <el-icon><Promotion /></el-icon> 开始评分
                                        <span style="font-size: 12px; opacity: 0.8; margin-left: 4px;">(Ctrl+Enter)</span>
                                    </el-button>
                                </div>
                            </div>
                        </div>

                        <!-- 折叠时的展开按钮 -->
                        <el-button v-if="inputCollapsed" @click="inputCollapsed = false" style="flex-shrink: 0; height: auto; padding: 20px 8px; writing-mode: vertical-lr; letter-spacing: 2px;">
                            <el-icon><DArrowRight /></el-icon> 展开输入
                        </el-button>

                        <!-- 右侧结果区 -->
                        <div v-if="grading || gradeResult" :style="{ flex: resultCollapsed ? '0 0 auto' : '1', width: resultCollapsed ? '0' : 'auto', overflow: 'hidden', transition: 'width 0.25s, flex 0.25s', minWidth: 0 }">
                            <div class="page-card" style="margin-bottom: 0;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                                    <span style="font-size: 16px; font-weight: 600; color: #303133;">评分结果</span>
                                    <el-button size="small" text @click="resultCollapsed = !resultCollapsed">
                                        <el-icon v-if="resultCollapsed"><DArrowRight /></el-icon>
                                        <el-icon v-else><DArrowLeft /></el-icon>
                                        {{ resultCollapsed ? '展开' : '折叠' }}
                                    </el-button>
                                </div>
                                <div v-show="!resultCollapsed">

                                <!-- 正在评分 -->
                                <div v-if="grading" style="padding: 20px 0;">
                                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
                                        <el-icon class="is-loading" :size="20" color="#409EFF"><Loading /></el-icon>
                                        <span style="font-size: 15px; font-weight: 600; color: #409EFF;">正在处理考生答案...</span>
                                    </div>
                                    <div style="background: #f5f7fa; border-radius: 8px; padding: 12px;">
                                        <div style="font-size: 12px; color: #909399; margin-bottom: 6px;">考生答案：</div>
                                        <div style="font-size: 13px; color: #606266; line-height: 1.6; white-space: pre-wrap; max-height: 300px; overflow-y: auto;">{{ studentAnswer }}</div>
                                    </div>
                                </div>

                                <!-- 评分结果 -->
                                <template v-if="!grading && gradeResult">
                                    <!-- ========== 单模型结果 ========== -->
                                    <template v-if="!gradeResult.multi">
                                        <!-- 分数 + 置信度 + 进度条 一行 -->
                                        <div style="display: flex; align-items: center; gap: 12px; padding: 8px 0; margin-bottom: 8px;">
                                            <template v-if="gradeResult.score === null || gradeResult.score === undefined">
                                                <el-icon color="#f56c6c" :size="20"><CircleCloseFilled /></el-icon>
                                                <div>
                                                    <div style="color: #f56c6c; font-weight: 600; font-size: 15px;">评分异常</div>
                                                    <div style="font-size: 12px; color: #f56c6c; margin-top: 2px;">需人工处理，请点击"重新评分"重试</div>
                                                </div>
                                            </template>
                                            <template v-else>
                                                <span style="font-size: 28px; font-weight: 700; color: #409EFF;">{{ gradeResult.score }}</span>
                                                <span style="font-size: 13px; color: #909399;">/ {{ currentMaxScore }}{{ selectedQuestion?.subject === 'english' ? ' pts' : ' 分' }}</span>
                                                <div style="flex: 1; max-width: 160px;">
                                                    <el-progress :percentage="Math.round(gradeResult.score / currentMaxScore * 100)" :stroke-width="6" :color="scoreColor" :show-text="false"></el-progress>
                                                </div>
                                                <el-tag :type="gradeResult.confidence >= 0.8 ? 'success' : gradeResult.confidence >= 0.6 ? 'warning' : 'danger'" size="small">
                                                    {{ (gradeResult.confidence * 100).toFixed(0) }}%
                                                </el-tag>
                                            </template>
                                        </div>

                                        <!-- 三层得分（技术细节，默认折叠） -->
                                        <el-collapse v-if="gradeResult.layer_scores" style="margin-bottom: 12px;">
                                            <el-collapse-item>
                                                <template #title>
                                                    <span style="font-size: 12px; color: #909399;">评分过程详情</span>
                                                </template>
                                                <div style="padding: 10px 14px; background: #f5f7fa; border-radius: 6px;">
                                                    <div style="display: flex; gap: 16px;">
                                                        <div style="flex: 1; text-align: center;">
                                                            <div style="font-size: 11px; color: #909399; margin-bottom: 2px;">{{ selectedQuestion?.subject === 'english' ? '采分点匹配' : '关键词匹配' }}</div>

                    </el-dialog>

                    <!-- 评分脚本版本历史对话框 -->
                    <el-dialog v-model="historyDialogVisible" title="评分脚本版本历史" width="720px" :close-on-click-modal="false">
                        <el-table :data="scriptHistoryList" stripe size="small" max-height="400" style="width: 100%;">
                            <el-table-column prop="version" label="版本" width="70" align="center">
                                <template #default="{ row }">
                                    <el-tag size="small" :type="row.version === scriptVersion ? 'primary' : 'info'">
                                        v{{ row.version }}
                                    </el-tag>
                                </template>
                            </el-table-column>
                            <el-table-column prop="note" label="备注" width="140" show-overflow-tooltip />
                            <el-table-column prop="created_at" label="创建时间" width="160" />
                            <el-table-column label="验证结果" width="140">
                                <template #default="{ row }">
                                    <template v-if="row.total_cases > 0">
                                        <el-tag size="small" :type="row.passed_count === row.total_cases ? 'success' : 'warning'">
                                            {{ row.passed_count }}/{{ row.total_cases }} 通过
                                        </el-tag>
                                        <span v-if="row.avg_error != null" style="font-size: 11px; color: #909399; margin-left: 4px;">
                                            偏差 {{ row.avg_error.toFixed(2) }}
                                        </span>
                                    </template>
                                    <span v-else style="font-size: 12px; color: #c0c4cc;">未验证</span>
                                </template>
                            </el-table-column>
                            <el-table-column label="操作" width="120" align="center">
                                <template #default="{ row }">
                                    <el-button size="small" text type="primary" @click="historyPreviewText = row.script_text">预览</el-button>
                                    <el-button size="small" text type="warning" @click="rollbackScriptVersion(row.version)">回滚</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                        <div v-if="historyPreviewText" style="margin-top: 12px;">
                            <div style="font-size: 12px; color: #909399; margin-bottom: 4px;">脚本内容预览</div>
                            <el-input type="textarea" :model-value="historyPreviewText" :readonly="true"
                                :rows="8"
                                :input-style="{ fontFamily: 'Menlo, Monaco, Consolas, monospace', fontSize: '12px', lineHeight: '1.6', background: '#f5f7fa' }">
                            </el-input>
                            <div style="margin-top: 6px; text-align: right;">
                                <el-button size="small" text @click="historyPreviewText = ''">关闭预览</el-button>
                            </div>
                        </div>
                    </el-dialog>
                </template>

                <!-- ========== 反作弊测试 ========== -->
                <template v-if="currentPage === 'anticheat'">
                    <div class="page-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                            <div>
                                <span style="font-size: 16px; font-weight: 600; color: #303133;">反作弊测试</span>
                                <el-tag v-if="selectedQuestion" size="small" style="margin-left: 8px;">{{ selectedQuestion.title || '#' + selectedQuestion.id }}</el-tag>
                            </div>
                            <el-button v-if="selectedQuestionId" type="danger" size="small" :loading="anicheatRunning" @click="runAncheatTests">
                                <el-icon><VideoPlay /></el-icon> 开始反作弊测试
                            </el-button>
                        </div>

                        <!-- 未选题提示 -->
                        <el-empty v-if="!selectedQuestionId" description="请先在「单题评分」中选择题目"></el-empty>

                        <template v-if="selectedQuestionId">
                            <div style="background: #fdf6ec; border: 1px solid #faecd8; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 13px; color: #e6a23c;">
                                将自动对当前题目运行 5 种作弊场景，验证是否都能正确判为 0 分。通过 = 得 0 分，失败 = 未判 0 分。
                            </div>

                            <!-- 测试结果表格 -->
                            <el-table :data="anicheatResults" style="width: 100%;" :row-class-name="anicheatRowClass">
                                <el-table-column label="场景" prop="scenario" width="160"></el-table-column>
                                <el-table-column label="作弊答案预览" min-width="200">
                                    <template #default="scope">
                                        <div style="font-size: 12px; color: #909399; max-height: 40px; overflow: hidden; text-overflow: ellipsis;">{{ scope.row.answerPreview }}</div>
                                    </template>
                                </el-table-column>
                                <el-table-column label="得分" width="80">
                                    <template #default="scope">
                                        <span v-if="scope.row.score !== null" :style="{ fontWeight: 600, color: scope.row.passed ? '#67c23a' : '#f56c6c' }">{{ scope.row.score }}</span>
                                        <span v-else style="color: #909399;">-</span>
                                    </template>
                                </el-table-column>
                                <el-table-column label="结果" width="80">
                                    <template #default="scope">
                                        <template v-if="scope.row.score !== null">
                                            <el-tag v-if="scope.row.passed" type="success" size="small">通过</el-tag>
                                            <el-tag v-else type="danger" size="small">失败</el-tag>
                                        </template>
                                        <el-tag v-else-if="scope.row.error" type="info" size="small">{{ scope.row.error }}</el-tag>
                                        <span v-else style="color: #909399;">-</span>
                                    </template>
                                </el-table-column>
                                <el-table-column label="评语" min-width="200" show-overflow-tooltip>
                                    <template #default="scope">
                                        <div style="font-size: 12px; color: #909399;">{{ scope.row.comment || '-' }}</div>
                                    </template>
                                </el-table-column>
                            </el-table>

                            <!-- 汇总 -->
                            <div v-if="anicheatResults.length > 0 && !anicheatRunning" style="margin-top: 16px; text-align: center;">
                                <template v-if="anicheatResults.every(r => r.passed)">
                                    <el-tag type="success" size="large">全部通过（{{ anicheatResults.length }}/{{ anicheatResults.length }}）</el-tag>
                                </template>
                                <template v-else>
                                    <el-tag type="danger" size="large">有失败项（{{ anicheatResults.filter(r => r.passed).length }}/{{ anicheatResults.length }} 通过）</el-tag>
                                </template>
                            </div>

                            <!-- 进度 -->
                            <div v-if="anicheatRunning" style="margin-top: 16px;">
                                <el-progress :percentage="anicheatProgress" :stroke-width="8"></el-progress>
                                <div style="text-align: center; margin-top: 8px; font-size: 13px; color: #909399;">{{ anicheatText }}</div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- ========== 历史记录 ========== -->
                <template v-if="currentPage === 'history'">
                    <div class="page-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                            <span style="font-size: 16px; font-weight: 600; color: #303133;">评分历史</span>
                            <el-button size="small" @click="clearHistory">
                                <el-icon><Delete /></el-icon> 清空历史
                            </el-button>
                        </div>
                        <el-empty v-if="history.length === 0" description="暂无评分记录"></el-empty>
                        <el-timeline v-else>
                            <el-timeline-item v-for="(item, idx) in history" :key="idx" :timestamp="item.time" placement="top" :type="item.score !== null ? 'primary' : 'danger'">
                                <el-card shadow="hover" style="margin-bottom: 0;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                        <el-tag :type="item.score !== null ? 'primary' : 'danger'" size="large">
                                            {{ item.score !== null ? item.score + ' 分' : '评分异常' }}
                                        </el-tag>
                                        <el-tag :type="item.confidence >= 0.8 ? 'success' : item.confidence >= 0.6 ? 'warning' : 'danger'" size="small">
                                            置信度 {{ (item.confidence * 100).toFixed(1) }}%
                                        </el-tag>
                                    </div>
                                    <div style="font-size: 13px; color: #606266; line-height: 1.5;">{{ item.question }}</div>
                                </el-card>
                            </el-timeline-item>
                        </el-timeline>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { useApp } from '/static/js/useApp.js';

const { createApp, onMounted } = Vue;

const app = createApp({
    setup() {
        const appData = useApp();

        const sanitizeHtml = window.SharedApp.sanitizeHtml;

        onMounted(() => {
            appData.init();
        });

        return { ...appData, sanitizeHtml };
    }
});

app.use(ElementPlus);
app.mount('#app');
</script>
</body>
</html>
